name: Update wealth data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-publish-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build data snapshot
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python3 scripts/build_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/unified-rankings.json assets/fallback-data.js
          git diff --cached --quiet || git commit -m "Update wealth ranking data"
          git push origin HEAD:${{ github.ref_name }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Upload static site to FTP
        if: ${{ vars.ENABLE_FTP_DEPLOY == 'true' }}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: python3 scripts/ftp_upload.py
